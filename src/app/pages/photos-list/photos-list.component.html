<div class="container">
  <h1>Images</h1>
  <mat-action-list>
    @for (img of photos(); track img.date; let i = $index) {
      <div class="listElement">
        <img mat-list-avatar [src]="img.url" alt="{{ img.title }}" />
        <button mat-list-item [routerLink]="['/photos', img.date]">
          {{ i + 1 }} - {{ img.title }}
        </button>
      </div>
    }
  </mat-action-list>
</div>
