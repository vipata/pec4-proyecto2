@if (loading()) {
  <div class="spinner-container">
    <mat-spinner />
  </div>
} @else {
  <div class="container">
    <div class="header">
      <h1>Images</h1>
      <mat-button-toggle-group
        [value]="viewMode()"
        (change)="viewMode.set($event.value)"
      >
        <mat-button-toggle value="cards"
          ><mat-icon>grid_view</mat-icon></mat-button-toggle
        >
        <mat-button-toggle value="list"
          ><mat-icon>view_list</mat-icon></mat-button-toggle
        >
      </mat-button-toggle-group>
    </div>

    @if (viewMode() === "list") {
      <app-list [photos]="photos()" [appRoute]="'/photos'"></app-list>
    } @else {
      <div class="cards-grid">
        @for (img of photos(); track img.date; let i = $index) {
          <app-card
            [appRoute]="'/photos'"
            [imgDate]="img.date"
            [imgIndex]="i"
            [imgTitle]="img.title"
            [imgUrl]="img.url"
          ></app-card>
        }
      </div>
    }
  </div>
}
