<div class="container">
  <div class="header">
    <h1>Images</h1>
    <mat-button-toggle-group
      [value]="viewMode()"
      (change)="viewMode.set($event.value)"
    >
      <mat-button-toggle value="cards"
        ><mat-icon>grid_view</mat-icon></mat-button-toggle
      >
      <mat-button-toggle value="list"
        ><mat-icon>view_list</mat-icon></mat-button-toggle
      >
    </mat-button-toggle-group>
  </div>

  @if (viewMode() === "list") {
    <mat-action-list>
      @for (img of photos(); track img.date; let i = $index) {
        <div class="listElement">
          <img mat-list-avatar [src]="img.url" alt="{{ img.title }}" />
          <button mat-list-item [routerLink]="['/photos', img.date]">
            {{ i + 1 }} - {{ img.title }}
          </button>
        </div>
      }
    </mat-action-list>
  } @else {
    <div class="cards-grid">
      @for (img of photos(); track img.date; let i = $index) {
        <mat-card [routerLink]="['/photos', img.date]" style="cursor: pointer">
          <mat-card-header>
            <mat-card-title>{{ i + 1 }} - {{ img.title }}</mat-card-title>
          </mat-card-header>
          <img mat-card-image [src]="img.url" [alt]="img.title" />
        </mat-card>
      }
    </div>
  }
</div>
